name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # also lets you trigger manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Installs Gradle 8.2.2 directly — no wrapper jar needed
      - name: Setup Gradle

        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      # Tell Gradle where the Android SDK is
      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties

      # Build the debug APK
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      # Upload APK so you can download it from the Actions tab
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICAI-Batch-Monitor-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
